<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Haze — Gameplay Overlay</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <!-- Control Bar — hover top edge to reveal -->
  <div id="control-bar">
    <div class="control-inner">
      <div class="control-group">
        <span class="control-label">Scene</span>
        <button class="ctrl-btn active" data-scene="gameplay" onclick="switchScene('gameplay')">Gameplay</button>
        <button class="ctrl-btn" data-scene="chatting" onclick="switchScene('chatting')">Chatting</button>
        <button class="ctrl-btn" data-scene="ultrawide" onclick="switchScene('ultrawide')">Ultrawide</button>
      </div>
      <div class="control-divider"></div>
      <div class="control-group">
        <span class="control-label">Toggle</span>
        <label class="ctrl-toggle"><input type="checkbox" checked data-toggle="music" onchange="applyToggle('music', this.checked)"><span>Now Playing</span></label>
        <label class="ctrl-toggle"><input type="checkbox" checked data-toggle="camera" onchange="applyToggle('camera', this.checked)"><span>Camera</span></label>
        <label class="ctrl-toggle"><input type="checkbox" checked data-toggle="bokeh" onchange="applyToggle('bokeh', this.checked)"><span>Bokeh</span></label>
        <label class="ctrl-toggle"><input type="checkbox" checked data-toggle="sweep" onchange="applyToggle('sweep', this.checked)"><span>Sweep</span></label>
        <label class="ctrl-toggle"><input type="checkbox" checked data-toggle="progress" onchange="applyToggle('progress', this.checked)"><span>Progress</span></label>
      </div>
      <div class="control-divider"></div>
      <div class="control-group">
        <span class="control-label">Presets</span>
        <button class="ctrl-btn small" onclick="applyPreset('full')">Full</button>
        <button class="ctrl-btn small" onclick="applyPreset('minimal')">Minimal</button>
        <button class="ctrl-btn small" onclick="applyPreset('off')">Off</button>
      </div>
    </div>
  </div>

  <!-- Gameplay Scene: Camera + Music (bottom-right) -->
  <div id="gameplay-scene">
    <div class="camera-frame fade-in" id="camera">
      <div class="camera-glow-pulse"></div>
      <div class="camera-inner">
        <!-- OBS: Add your Video Capture Device source inside this frame -->
      </div>
    </div>

    <div class="music-widget fade-in" id="music-widget">
      <div class="music-text">
        <div class="now-playing-label">
          <span class="eq-icon">
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
          </span>
          Now Playing
        </div>
        <div class="song-title" id="song-title">No song playing.. Suggest one in the chat!</div>
        <div class="song-artist" id="song-artist">—</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="song-progress"></div>
        </div>
      </div>
      <div class="album-art-wrap">
        <img class="album-art" id="album-art" src="" alt="Album Art">
      </div>
    </div>
  </div>

  <!-- TwitchAlerts injects here -->
  <div id="alert-box"></div>

  <script src="config.js"></script>
  <script src="js/twitch-api.js"></script>
  <script src="js/lastfm-api.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/overlay.js"></script>
</body>
</html>
